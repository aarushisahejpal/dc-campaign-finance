name: Daily data update

on:
  schedule:
    # 6am ET every day (11:00 UTC)
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # OCF e-filing: auto-scraped daily (CSV export, exact match)
      - name: Scrape OCF contributions and expenditures
        run: python scrapers/ocf_scraper.py

      # FEC: auto-scraped daily (API, exact match)
      - name: Scrape FEC data
        run: python scrapers/fec_scraper.py

      # Fair Elections: NOT auto-scraped.
      # The payment overview page requires login and the page-by-page
      # scraper introduces rounding differences vs the official export.
      # Upload a fresh Excel export weekly: download from
      # fairelections.ocf.dc.gov -> Fair Elections Candidates Payment
      # and Information -> Download Results (Excel), save as
      # data/raw/fair_elections_export.xlsx, then run:
      #   python scripts/parse_fair_elections_excel.py

      - name: Process all data
        run: python scripts/process_data.py

      - name: Verify data
        run: |
          echo "=== Data check ==="
          wc -l data/raw/contributions.csv data/raw/expenditures.csv
          ls -lh data/site_data.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "data: daily update $(date -u +%Y-%m-%d)"
            git push
          fi
